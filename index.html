<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aelion – Transformación REAL del sector AEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        .logo {
            width: 80vw;
            max-width: 820px;
            /* Glow más sutil */
            filter: drop-shadow(0 0 6px rgba(126, 211, 33, 0.4));
            animation: blink 5s steps(2, start) infinite;
        }
        @keyframes blink {
            0%, 92%, 100% {
                opacity: 1;
                filter: drop-shadow(0 0 6px rgba(126, 211, 33, 0.4));
            }
            96% {
                opacity: 0.3;
                filter: drop-shadow(0 0 2px rgba(126, 211, 33, 0.2));
            }
        }

        .reveal-text {
            font-size: 2.6rem;
            font-weight: 300;
            /* Texto muy junto al logo */
            margin-top: 0.6rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            opacity: 0;
            animation: fadeInUp 2s ease-out forwards;
        }
        .reveal-text:nth-of-type(2) {
            margin-top: 0.4rem;
            animation-delay: 1.2s;
        }

        .highlight {
            color: #7ed321;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(126,211,33,0.5);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media(max-width:768px) {
            .logo { width:95vw; }
            .reveal-text { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo SVG as external file -->
        <img class="logo" src="Logo%20Aelion%20verde%20relleno%20plano%20.svg" alt="Logo Aelion">

        <h2 class="reveal-text">Transformación <span class="highlight">REAL</span></h2>
        <h2 class="reveal-text">del sector AEC aplicando tecnología avanzada</h2>
    </div>
</body>
</html>
